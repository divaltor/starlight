# Dokploy must deploy this as "Docker Compose", not "Stack", because Swarm
# services do not support direct AMD device mappings.
services:
  classification:
    build:
      context: classification
      dockerfile: Dockerfile
    env_file:
      - ${CLASSIFICATION_ENV_FILE:-.env}
    environment:
      MODEL_DEVICE: cuda
      TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL: "1"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/renderD128:/dev/dri/renderD128
    security_opt:
      - seccomp=unconfined
    expose:
      - 8000
    volumes:
      - classification_models:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  classification_models:
