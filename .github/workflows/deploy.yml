name: Build and Deploy Services

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/server/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "classification/**"
  workflow_dispatch:
    inputs:
      target:
        description: Service to build and deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - web
          - server
          - classification

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  detect-services:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.collect.outputs.build_matrix }}
      has_builds: ${{ steps.collect.outputs.has_builds }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - if: ${{ github.event_name == 'push' }}
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
            server:
              - 'apps/server/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
            classification:
              - 'classification/**'

      - id: collect
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET: ${{ github.event.inputs.target }}
          WEB_CHANGED: ${{ steps.changes.outputs.web }}
          SERVER_CHANGED: ${{ steps.changes.outputs.server }}
          CLASSIFICATION_CHANGED: ${{ steps.changes.outputs.classification }}
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const services = {
            web: {
              service: 'web',
              context: '.',
              dockerfile: 'apps/web/Dockerfile',
              image: 'starlight/web',
            },
            server: {
              service: 'server',
              context: '.',
              dockerfile: 'apps/server/Dockerfile',
              image: 'starlight/server',
            },
            classification: {
              service: 'classification',
              context: 'classification',
              dockerfile: 'Dockerfile',
              image: 'starlight/classification',
            },
          }

          const selected = []
          const add = (name) => {
            if (!selected.includes(name)) {
              selected.push(name)
            }
          }

          if (process.env.EVENT_NAME === 'workflow_dispatch') {
            const target = process.env.INPUT_TARGET || 'all'

            if (target === 'all') {
              Object.keys(services).forEach(add)
            } else if (services[target]) {
              add(target)
            }
          } else {
            if (process.env.WEB_CHANGED === 'true') {
              add('web')
            }

            if (process.env.SERVER_CHANGED === 'true') {
              add('server')
            }

            if (process.env.CLASSIFICATION_CHANGED === 'true') {
              add('classification')
            }
          }

          const buildMatrix = selected.map((service) => services[service])

          process.stdout.write(`build_matrix=${JSON.stringify({ include: buildMatrix })}\n`)
          process.stdout.write(`has_builds=${buildMatrix.length > 0}\n`)
          EOF

  build-and-deploy:
    needs: detect-services
    if: ${{ needs.detect-services.outputs.has_builds == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-services.outputs.build_matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: rezakargar/setup-unregistry@v1
        with:
          version: v0.4.2

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ vars.DEPLOY_TAILSCALE_HOST }}

      - name: Prepare SSH
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_TAILSCALE_HOST }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Push image directly to server
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_TAILSCALE_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_SSH_USER }}
        run: |
          docker pussh "${{ matrix.image }}:latest" "${DEPLOY_USER}@${DEPLOY_HOST}" -i ~/.ssh/id_ed25519

      - name: Recreate changed container with Watchtower
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_TAILSCALE_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_SSH_USER }}
          DEPLOY_CONTAINER_WEB: ${{ vars.DEPLOY_CONTAINER_WEB }}
          DEPLOY_CONTAINER_SERVER: ${{ vars.DEPLOY_CONTAINER_SERVER }}
          DEPLOY_CONTAINER_CLASSIFICATION: ${{ vars.DEPLOY_CONTAINER_CLASSIFICATION }}
        run: |
          case "${{ matrix.service }}" in
            web)
              container_name="${DEPLOY_CONTAINER_WEB:-web}"
              ;;
            server)
              container_name="${DEPLOY_CONTAINER_SERVER:-server}"
              ;;
            classification)
              container_name="${DEPLOY_CONTAINER_CLASSIFICATION:-classification}"
              ;;
            *)
              printf 'Unknown service: %s\n' "${{ matrix.service }}" >&2
              exit 1
              ;;
          esac

          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" "docker run --rm -v /var/run/docker.sock:/var/run/docker.sock nickfedor/watchtower:1.15.0 --run-once --no-pull --cleanup '${container_name}'"
